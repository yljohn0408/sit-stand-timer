<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>专注时钟</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="./icon.png">
    
    <style>
        :root {
            /* 动态流光背景色 */
            --bg-work: radial-gradient(circle at 50% 30%, #1a2a40 0%, #000000 70%);
            --bg-rest: radial-gradient(circle at 50% 30%, #1a3b2a 0%, #000000 70%);
            
            --accent-work: #4facfe;
            --accent-rest: #43e97b;
            --glass-panel: rgba(255, 255, 255, 0.08);
            --text-muted: rgba(255, 255, 255, 0.5);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
            background-image: var(--bg-work);
            background-color: #000;
            color: #fff;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background-image 1.5s ease-in-out;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        body.mode-rest { background-image: var(--bg-rest); }

        .container {
            width: 85%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        /* 顶部状态胶囊 */
        .status-pill {
            padding: 6px 16px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 20px;
            transition: all 0.5s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        body.mode-work .status-pill { color: var(--accent-work); border-color: rgba(79, 172, 254, 0.3); box-shadow: 0 0 15px rgba(79, 172, 254, 0.2); }
        body.mode-rest .status-pill { color: var(--accent-rest); border-color: rgba(67, 233, 123, 0.3); box-shadow: 0 0 15px rgba(67, 233, 123, 0.2); }

        /* 超大计时器 */
        .timer-wrapper { position: relative; margin: 10px 0 50px 0; }
        
        .timer-display {
            font-size: 96px;
            font-weight: 200;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            letter-spacing: -3px;
            text-align: center;
            background: linear-gradient(180deg, #fff, rgba(255,255,255,0.6));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: all 0.5s;
        }

        @keyframes breathe {
            0%, 100% { opacity: 1; transform: scale(1); text-shadow: 0 0 20px rgba(255,255,255,0.1); }
            50% { opacity: 0.8; transform: scale(0.98); text-shadow: 0 0 0px rgba(255,255,255,0); }
        }
        body.running .timer-display { animation: breathe 4s infinite ease-in-out; }

        /* 设置面板布局 */
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            margin-bottom: 30px;
            transition: all 0.3s;
        }

        .setting-card {
            background: var(--glass-panel);
            border-radius: 18px;
            padding: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .setting-card.full-width { grid-column: span 2; flex-direction: row; justify-content: space-between; padding: 15px 25px; }

        .setting-label { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
        
        /* 隐形输入框 */
        input[type="number"] {
            background: transparent; border: none; color: #fff; font-size: 28px; font-weight: 500;
            text-align: center; width: 100%; padding: 0; font-family: "SF Pro Display"; outline: none;
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .unit { font-size: 12px; color: var(--text-muted); margin-top: -5px;}

        /* 音效选择器 */
        select.sound-select {
            appearance: none; -webkit-appearance: none;
            background: transparent; border: none;
            color: #fff; font-size: 16px; font-weight: 500;
            text-align: right; direction: rtl;
            padding-right: 0px; outline: none;
            font-family: -apple-system;
        }
        select.sound-select option { background-color: #1c1c1e; color: #fff; }

        /* Switch 开关 */
        .switch { position: relative; width: 50px; height: 30px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.2); border-radius: 34px; transition: .4s;
        }
        .slider:before {
            position: absolute; content: ""; height: 26px; width: 26px; left: 2px; bottom: 2px;
            background-color: white; border-radius: 50%; transition: .4s; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        input:checked + .slider { background-color: var(--accent-work); }
        body.mode-rest input:checked + .slider { background-color: var(--accent-rest); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* 主按钮 */
        .btn-main {
            width: 100%; height: 64px; border-radius: 32px; border: none;
            font-size: 18px; font-weight: 600; color: #fff;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 10px; letter-spacing: 1px;
        }
        
        .btn-start { background: linear-gradient(135deg, #0061ff, #60efff); box-shadow: 0 10px 30px rgba(0, 97, 255, 0.3); }
        body.mode-rest .btn-start { background: linear-gradient(135deg, #43e97b, #38f9d7); box-shadow: 0 10px 30px rgba(67, 233, 123, 0.3); color: #000; }
        .btn-stop { background: rgba(255, 59, 48, 0.15); color: #ff3b30; border: 1px solid rgba(255, 59, 48, 0.3); }
        .btn-main:active { transform: scale(0.97); }

        .progress-line { position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: rgba(255,255,255,0.1); }
        .progress-fill { height: 100%; width: 0%; background: #fff; box-shadow: 0 0 10px #fff; transition: width 1s linear; }

        #silent-player { display: none; }
        .hint { margin-top: 20px; font-size: 12px; color: var(--text-muted); }
    </style>
</head>
<body class="mode-work">

    <div class="progress-line"><div class="progress-fill" id="progress"></div></div>
    
    <audio id="silent-player" loop playsinline>
        <source src="data:audio/mp3;base64,SUQzBAAAAAABAFRYWFgAAAASAAADbWFqb3JfYnJhbmQAbXA0MgBUWFhYAAAAEQAAA21pbm9yX3ZlcnNpb24AMABUWFhYAAAAHAAAA2NvbXBhdGlibGVfYnJhbmRzAGlzb21tcDQyAFRTU0UAAAAPAAADTGF2ZjU3LjU2LjEwMAAAAAAAAAAAAAAA//uQZAAAAAAAABAAAAAAAAAAAAQN6AAAAAAABAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP/7kGQAAAAAAAEAAAAAAAAAAABAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA" type="audio/mpeg">
    </audio>

    <div class="container">
        <div id="badge" class="status-pill">准备就绪</div>

        <div class="timer-wrapper">
            <div class="timer-display" id="timer">00:00</div>
        </div>

        <div class="settings-grid" id="settings">
            <div class="setting-card">
                <div class="setting-label">专注时长</div>
                <input type="number" id="work-input" value="45" inputmode="numeric">
                <div class="unit">分钟</div>
            </div>
            <div class="setting-card">
                <div class="setting-label">休息时长</div>
                <input type="number" id="rest-input" value="5" inputmode="numeric">
                <div class="unit">分钟</div>
            </div>
            
            <div class="setting-card full-width">
                <div class="setting-label" style="margin:0; font-size: 14px;">提示音效</div>
                <select id="sound-select" class="sound-select">
                    <option value="standard">标准 (Standard)</option>
                    <option value="soft">温润 (Chime)</option>
                    <option value="alarm">急促 (Alarm)</option>
                    <option value="scifi">科幻 (Warp)</option>
                </select>
            </div>

            <div class="setting-card full-width">
                <div class="setting-label" style="margin:0; font-size: 14px;">自动循环</div>
                <label class="switch">
                    <input type="checkbox" id="loop-check" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <button id="btn-toggle" class="btn-main btn-start">
            <span id="btn-text">开始专注</span>
        </button>

        <div class="hint" id="status-msg">点击上方数字可修改时间</div>
    </div>

<script>
    const STATE = { IDLE: 'idle', WORK: 'work', REST: 'rest' };
    let currentState = STATE.IDLE;
    let intervalId = null;
    let endTime = null;
    let totalSeconds = 0;
    
    const silentPlayer = document.getElementById('silent-player');
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const dom = {
        body: document.body,
        timer: document.getElementById('timer'),
        badge: document.getElementById('badge'),
        btn: document.getElementById('btn-toggle'),
        btnText: document.getElementById('btn-text'),
        settings: document.getElementById('settings'),
        progress: document.getElementById('progress'),
        status: document.getElementById('status-msg'),
        inputs: {
            work: document.getElementById('work-input'),
            rest: document.getElementById('rest-input'),
            loop: document.getElementById('loop-check'),
            sound: document.getElementById('sound-select') // 新增
        }
    };

    function loadSettings() {
        const saved = localStorage.getItem('sitAppConfig');
        if (saved) {
            const config = JSON.parse(saved);
            dom.inputs.work.value = config.work || 45;
            dom.inputs.rest.value = config.rest || 5;
            dom.inputs.loop.checked = config.loop !== undefined ? config.loop : true;
            dom.inputs.sound.value = config.sound || 'standard'; // 新增
        }
        updateDisplayTime(dom.inputs.work.value * 60);
    }

    function saveSettings() {
        localStorage.setItem('sitAppConfig', JSON.stringify({
            work: dom.inputs.work.value,
            rest: dom.inputs.rest.value,
            loop: dom.inputs.loop.checked,
            sound: dom.inputs.sound.value // 新增
        }));
    }

    // --- 音效合成核心 (Synthesizer) ---
    // 使用 Web Audio API 现场合成声音，无需外部文件
    function playTone(preset, type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        // 标准版 (默认)
        if (preset === 'standard') {
            if (type === 'finish_work') {
                // 哔-哔-哔 (高频方波)
                osc.type = 'square';
                osc.frequency.setValueAtTime(800, now);
                gain.gain.setValueAtTime(0.1, now);
                osc.start(now);
                osc.stop(now + 0.15);
                // 这里的逻辑只发一声，循环由外部控制
            } else {
                // 柔和一点的正弦波
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, now);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 1);
                osc.start(now);
                osc.stop(now + 1);
            }
        }
        
        // 温润版 (Chime)
        else if (preset === 'soft') {
            osc.type = 'sine'; // 正弦波最柔和
            if (type === 'finish_work') {
                // 类似门铃 Ding-Dong
                osc.frequency.setValueAtTime(660, now); // E5
                osc.frequency.exponentialRampToValueAtTime(550, now + 0.1); // C#5
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.3, now + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 1.5);
                osc.start(now);
                osc.stop(now + 1.5);
            } else {
                // 简单的提示音
                osc.frequency.setValueAtTime(440, now);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 1);
                osc.start(now);
                osc.stop(now + 1);
            }
        }

        // 急促版 (Alarm)
        else if (preset === 'alarm') {
            osc.type = 'sawtooth'; // 锯齿波很刺耳
            if (type === 'finish_work') {
                osc.frequency.setValueAtTime(1000, now);
                osc.frequency.linearRampToValueAtTime(800, now + 0.2);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            } else {
                osc.type = 'square';
                osc.frequency.setValueAtTime(500, now);
                gain.gain.setValueAtTime(0.1, now);
                osc.start(now);
                osc.stop(now + 0.5);
            }
        }

        // 科幻版 (Sci-Fi)
        else if (preset === 'scifi') {
            if (type === 'finish_work') {
                // 频率滑升
                osc.type = 'sine';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.3);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else {
                // 频率滑降
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(200, now + 0.5);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
            }
        }
    }

    // 播放警报的入口函数
    function playAlert(type) {
        const preset = dom.inputs.sound.value;
        playTone(preset, type);
    }

    // --- 音频保活 ---
    function startKeepAlive() {
        silentPlayer.volume = 0.01; 
        silentPlayer.play().catch(e => console.log("Silent play error:", e));
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function stopKeepAlive() {
        silentPlayer.pause();
        silentPlayer.currentTime = 0;
    }

    // --- 通知 & 计时 ---
    async function requestPermission() {
        if ("Notification" in window && Notification.permission !== "granted") {
            await Notification.requestPermission();
        }
    }

    function sendNotify(title, body) {
        if (document.visibilityState === 'visible') return;
        if ("Notification" in window && Notification.permission === "granted") {
            try { new Notification(title, { body: body, tag: 'sit-stand', renotify: true }); } catch (e) {}
        }
    }
    
    function updateDisplayTime(seconds) {
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        dom.timer.innerText = `${m}:${s}`;
        document.title = `${m}:${s} - ${currentState === STATE.WORK ? '专注中' : '休息中'}`;
    }

    function switchState(newState) {
        if (intervalId) { clearInterval(intervalId); intervalId = null; }
        currentState = newState;
        dom.body.classList.remove('mode-work', 'mode-rest', 'running');
        
        if (newState === STATE.IDLE) {
            stopKeepAlive();
            dom.body.classList.add('mode-work');
            dom.badge.innerText = "准备就绪";
            dom.btnText.innerText = "开始专注";
            dom.btn.className = "btn-main btn-start";
            dom.progress.style.width = '0%';
            dom.settings.style.opacity = '1';
            dom.settings.style.pointerEvents = 'auto';
            dom.settings.style.transform = 'scale(1)';
            dom.status.innerText = "点击上方数字可修改时间";
            updateDisplayTime(dom.inputs.work.value * 60);
            return;
        }

        startKeepAlive();
        dom.body.classList.add('running');
        dom.settings.style.opacity = '0.3';
        dom.settings.style.pointerEvents = 'none';
        dom.settings.style.transform = 'scale(0.95)';

        if (newState === STATE.WORK) {
            dom.body.classList.add('mode-work');
            dom.badge.innerText = "专注中";
            dom.btnText.innerText = "停止计时";
            dom.btn.className = "btn-main btn-stop";
            totalSeconds = parseInt(dom.inputs.work.value) * 60;
            dom.status.innerText = "保持专注，效率提升中...";
        } else if (newState === STATE.REST) {
            dom.body.classList.add('mode-rest');
            dom.badge.innerText = "休息中";
            dom.btnText.innerText = "跳过休息";
            dom.btn.className = "btn-main btn-start"; 
            totalSeconds = parseInt(dom.inputs.rest.value) * 60;
            dom.status.innerText = "站起来，活动一下筋骨！";
        }

        endTime = Date.now() + (totalSeconds * 1000);
        updateDisplayTime(totalSeconds);
        tick(); 
        intervalId = setInterval(tick, 1000);
    }

    function tick() {
        if (silentPlayer.paused) silentPlayer.play().catch(()=>{});
        const now = Date.now();
        const remaining = Math.max(0, Math.ceil((endTime - now) / 1000));
        updateDisplayTime(remaining);
        const elapsed = totalSeconds - remaining;
        const pct = (elapsed / totalSeconds) * 100;
        dom.progress.style.width = `${pct}%`;
        if (remaining <= 0) handleComplete();
    }

    function handleComplete() {
        if (intervalId) { clearInterval(intervalId); intervalId = null; }
        dom.settings.style.transform = 'scale(1)';

        if (currentState === STATE.WORK) {
            // 播放多次声音
            let count = 0;
            const maxCount = dom.inputs.sound.value === 'alarm' ? 6 : 3; // 警报模式响久一点
            
            playAlert('finish_work');
            const alarmInt = setInterval(() => {
                playAlert('finish_work');
                count++;
                if(count >= maxCount) clearInterval(alarmInt);
            }, 800); // 间隔0.8秒响一次

            sendNotify("🛑 时间到！", "已自动进入休息模式，请起立活动！");

            if (dom.inputs.loop.checked) {
                switchState(STATE.REST);
            } else {
                alert("⏰ 专注结束！");
                switchState(STATE.IDLE);
            }
        } else if (currentState === STATE.REST) {
            playAlert('finish_rest');
            sendNotify("💻 休息结束", "已自动开始专注，请回座。");
            if (dom.inputs.loop.checked) {
                switchState(STATE.WORK);
            } else {
                alert("🔔 休息结束！");
                switchState(STATE.IDLE);
            }
        }
    }

    // --- 事件绑定 ---
    dom.btn.addEventListener('click', () => {
        saveSettings();
        requestPermission();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        currentState === STATE.IDLE ? switchState(STATE.WORK) : switchState(STATE.IDLE);
    });

    [dom.inputs.work, dom.inputs.rest].forEach(input => {
        input.addEventListener('input', (e) => {
            if (currentState === STATE.IDLE) updateDisplayTime(dom.inputs.work.value * 60);
        });
        input.addEventListener('focus', (e) => e.target.select());
    });
    
    // 音效试听功能
    dom.inputs.sound.addEventListener('change', () => {
        saveSettings();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        // 播放当前选中的音效作为预览
        playAlert('finish_work');
    });

    loadSettings();
</script>
</body>
</html>
