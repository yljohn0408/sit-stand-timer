<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>专注时钟</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="./icon.png">
    
    <style>
        :root {
            --bg-work: radial-gradient(circle at 50% 30%, #1a2a40 0%, #000000 70%);
            --bg-rest: radial-gradient(circle at 50% 30%, #1a3b2a 0%, #000000 70%);
            --accent-work: #4facfe;
            --accent-rest: #43e97b;
            --glass-panel: rgba(255, 255, 255, 0.08);
            --text-muted: rgba(255, 255, 255, 0.5);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
            background-image: var(--bg-work);
            background-color: #000;
            color: #fff;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background-image 1.5s ease-in-out;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        body.mode-rest { background-image: var(--bg-rest); }

        .container {
            width: 85%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .status-pill {
            padding: 6px 16px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 20px;
            transition: all 0.5s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        body.mode-work .status-pill { color: var(--accent-work); border-color: rgba(79, 172, 254, 0.3); box-shadow: 0 0 15px rgba(79, 172, 254, 0.2); }
        body.mode-rest .status-pill { color: var(--accent-rest); border-color: rgba(67, 233, 123, 0.3); box-shadow: 0 0 15px rgba(67, 233, 123, 0.2); }

        .timer-wrapper { position: relative; margin: 10px 0 50px 0; }
        
        .timer-display {
            font-size: 96px; font-weight: 200; line-height: 1; font-variant-numeric: tabular-nums;
            letter-spacing: -3px; text-align: center;
            background: linear-gradient(180deg, #fff, rgba(255,255,255,0.6));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            transition: all 0.5s;
        }

        @keyframes breathe {
            0%, 100% { opacity: 1; transform: scale(1); text-shadow: 0 0 20px rgba(255,255,255,0.1); }
            50% { opacity: 0.8; transform: scale(0.98); text-shadow: 0 0 0px rgba(255,255,255,0); }
        }
        body.running .timer-display { animation: breathe 4s infinite ease-in-out; }

        .settings-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-bottom: 30px; transition: all 0.3s;
        }

        .setting-card {
            background: var(--glass-panel); border-radius: 18px; padding: 15px; text-align: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative;
        }

        .setting-card.full-width { grid-column: span 2; flex-direction: row; justify-content: space-between; padding: 15px 25px; }
        .setting-label { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
