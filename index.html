<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>专注时钟</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="./icon.png">
    
    <style>
        :root {
            --bg-work: radial-gradient(circle at 50% 30%, #1a2a40 0%, #000000 70%);
            --bg-rest: radial-gradient(circle at 50% 30%, #1a3b2a 0%, #000000 70%);
            --accent-work: #4facfe;
            --accent-rest: #43e97b;
            --glass-panel: rgba(255, 255, 255, 0.1);
            --text-muted: rgba(255, 255, 255, 0.5);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
            background-image: var(--bg-work);
            background-color: #000;
            color: #fff;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background-image 1.5s ease-in-out;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        /* 视觉警报：屏幕闪烁动画 */
        @keyframes strobe-flash {
            0% { background-color: #000; }
            50% { background-color: #555; }
            100% { background-color: #000; }
        }
        
        /* 红色警报闪烁 */
        body.alarm-active {
            animation: strobe-flash 0.5s infinite;
            background-image: none !important; /* 强制覆盖背景图 */
            background-color: #300 !important;
        }

        body.mode-rest { background-image: var(--bg-rest); }

        .container { width: 85%; max-width: 400px; display: flex; flex-direction: column; align-items: center; z-index: 10; }

        .status-pill {
            padding: 6px 16px; border-radius: 20px; background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
            color: var(--text-muted); margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05);
        }
        body.mode-work .status-pill { color: var(--accent-work); border-color: rgba(79, 172, 254, 0.3); }
        body.mode-rest .status-pill { color: var(--accent-rest); border-color: rgba(67, 233, 123, 0.3); }
        body.alarm-active .status-pill { color: #ff3b30; border-color: #ff3b30; background: #fff; }

        .timer-wrapper { position: relative; margin: 10px 0 40px 0; }
        .timer-display {
            font-size: 96px; font-weight: 200; line-height: 1; font-variant-numeric: tabular-nums;
            letter-spacing: -3px; text-align: center;
            background: linear-gradient(180deg, #fff, rgba(255,255,255,0.6));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        
        /* 呼吸动画 */
        @keyframes breathe {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.98); }
        }
        body.running .timer-display { animation: breathe 4s infinite ease-in-out; }
        body.alarm-active .timer-display { animation: none; color: #fff; -webkit-text-fill-color: #fff; }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-bottom: 30px; transition: all 0.3s; }
        .setting-card { background: var(--glass-panel); border-radius: 18px; padding: 15px; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .setting-card.full-width { grid-column: span 2; flex-direction: row; justify-content: space-between; padding: 15px 25px; }
        
        .setting-label { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
        input[type="number"] { background: transparent; border: none; color: #fff; font-size: 28px; font-weight: 500; text-align: center; width: 100%; padding: 0; outline: none; font-family: "SF Pro Display"; }
        .unit { font-size: 12px; color: var(--text-muted); margin-top: -5px;}
        
        .switch { position: relative; width: 50px; height: 30px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.2); border-radius: 34px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 2px; bottom: 2px; background-color: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background-color: var(--accent-work); }
        body.mode-rest input:checked + .slider { background-color: var(--accent-rest); }
        input:checked + .slider:before { transform: translateX(20px); }

        .btn-main { width: 100%; height: 64px; border-radius: 32px; border: none; font-size: 18px; font-weight: 600; color: #fff; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); cursor: pointer; transition: all 0.2s; letter-spacing: 1px; }
        .btn-start { background: linear-gradient(135deg, #0061ff, #60efff); box-shadow: 0 10px 30px rgba(0, 97, 255, 0.3); }
        body.mode-rest .btn-start { background: linear-gradient(135deg, #43e97b, #38f9d7); box-shadow: 0 10px 30px rgba(67, 233, 123, 0.3); color: #000; }
        .btn-stop { background: rgba(255, 59, 48, 0.15); color: #ff3b30; border: 1px solid rgba(255, 59, 48, 0.3); }
        
        .progress-line { position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: rgba(255,255,255,0.1); }
        .progress-fill { height: 100%; width: 0%; background: #fff; box-shadow: 0 0 10px #fff; transition: width 1s linear; }

        .hint { margin-top: 20px; font-size: 12px; color: var(--text-muted); opacity: 0.6; text-align: center; }
        .warning-text { color: #ff9f0a; font-size: 11px; margin-top: 5px; }
    </style>
</head>
<body class="mode-work">
    <div class="progress-line"><div class="progress-fill" id="progress"></div></div>

    <div class="container">
        <div id="badge" class="status-pill">准备就绪</div>
        <div class="timer-wrapper"><div class="timer-display" id="timer">00:00</div></div>

        <div class="settings-grid" id="settings">
            <div class="setting-card">
                <div class="setting-label">专注时长</div>
                <input type="number" id="work-input" value="45" inputmode="numeric"><div class="unit">分钟</div>
            </div>
            <div class="setting-card">
                <div class="setting-label">休息时长</div>
                <input type="number" id="rest-input" value="5" inputmode="numeric"><div class="unit">分钟</div>
            </div>
            <div class="setting-card full-width">
                <div class="setting-label">自动循环</div>
                <label class="switch">
                    <input type="checkbox" id="loop-check" checked><span class="slider"></span>
                </label>
            </div>
        </div>

        <button id="btn-toggle" class="btn-main btn-start"><span id="btn-text">开始专注</span></button>
        <div class="hint" id="status-msg">点击上方数字修改 · 静音下请留意震动</div>
    </div>

<script>
    const STATE = { IDLE: 'idle', WORK: 'work', REST: 'rest' };
    let currentState = STATE.IDLE;
    let intervalId = null;
    let endTime = null;
    let totalSeconds = 0;
    
    // Web Audio API (白噪音保活用，静音下虽然没声音，但能保活)
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = new AudioContext();
    let keepAliveNode = null;

    const dom = {
        body: document.body,
        timer: document.getElementById('timer'),
        badge: document.getElementById('badge'),
        btn: document.getElementById('btn-toggle'),
        btnText: document.getElementById('btn-text'),
        settings: document.getElementById('settings'),
        progress: document.getElementById('progress'),
        status: document.getElementById('status-msg'),
        inputs: {
            work: document.getElementById('work-input'),
            rest: document.getElementById('rest-input'),
            loop: document.getElementById('loop-check')
        }
    };

    // --- 1. 白噪音保活 (核心：让iOS以为你在听歌，从而允许后台发通知) ---
    function startWhiteNoise() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (keepAliveNode) return;

        const bufferSize = 2 * audioCtx.sampleRate;
        const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;

        keepAliveNode = audioCtx.createBufferSource();
        keepAliveNode.buffer = noiseBuffer;
        keepAliveNode.loop = true;
        
        // 极低音量，避免打扰，但必须有信号输出
        const gainNode = audioCtx.createGain();
        gainNode.gain.value = 0.001; 

        keepAliveNode.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        keepAliveNode.start(0);

        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: '专注计时中',
                artist: '请勿关闭后台',
                artwork: [{ src: './icon.png', sizes: '512x512', type: 'image/png' }]
            });
            navigator.mediaSession.setActionHandler('play', () => {});
            navigator.mediaSession.setActionHandler('pause', () => {});
        }
    }

    function stopWhiteNoise() {
        if (keepAliveNode) { try { keepAliveNode.stop(); } catch(e) {} keepAliveNode = null; }
        if ('mediaSession' in navigator) navigator.mediaSession.metadata = null;
    }

    // --- 2. 视觉警报 (Visual Strobe) ---
    // 既然听不见，那就闪瞎眼
    function triggerVisualAlarm() {
        dom.body.classList.add('alarm-active');
        // 5秒后停止闪烁，避免太费电
        setTimeout(() => {
            dom.body.classList.remove('alarm-active');
        }, 5000);
    }

    // --- 3. 震动模拟 (Notification Burst) ---
    // 既然不能直接调用震动马达，就连续发通知，引发系统震动
    async function triggerVibrationBurst(title, body) {
        if (!("Notification" in window) || Notification.permission !== "granted") return;

        // 连续发送 5 次通知，间隔 1.5 秒
        // 这会造成手机间歇性震动，像闹钟一样
        let count = 0;
        const burstInterval = setInterval(() => {
            count++;
            try {
                // 使用 tag 确保不会堆叠太多，但 renotify: true 确保每次都震动
                new Notification(title + (count > 1 ? ` (${count})` : ""), { 
                    body: body, 
                    tag: 'burst-alarm',
                    renotify: true 
                });
            } catch (e) { console.error(e); }

            if (count >= 5) clearInterval(burstInterval);
        }, 1500); 
    }

    // --- 权限申请 ---
    async function requestPermission() {
        if ("Notification" in window && Notification.permission !== "granted") {
            await Notification.requestPermission();
        }
    }

    // --- 主逻辑 ---
    function updateDisplayTime(seconds) {
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        dom.timer.innerText = `${m}:${s}`;
        document.title = `${m}:${s} - 专注时钟`;
    }

    function switchState(newState) {
        if (intervalId) { clearInterval(intervalId); intervalId = null; }
        currentState = newState;
        dom.body.classList.remove('mode-work', 'mode-rest', 'running', 'alarm-active');
        
        if (newState === STATE.IDLE) {
            stopWhiteNoise();
            dom.body.classList.add('mode-work');
            dom.badge.innerText = "准备就绪";
            dom.btnText.innerText = "开始专注";
            dom.btn.className = "btn-main btn-start";
            dom.progress.style.width = '0%';
            dom.settings.style.opacity = '1';
            dom.settings.style.pointerEvents = 'auto';
            dom.settings.style.transform = 'scale(1)';
            dom.status.innerText = "点击上方数字修改 · 静音下请留意震动";
            updateDisplayTime(dom.inputs.work.value * 60);
            return;
        }

        startWhiteNoise(); // 必须保活，否则后台发不出通知
        
        dom.body.classList.add('running');
        dom.settings.style.opacity = '0.3';
        dom.settings.style.pointerEvents = 'none';
        dom.settings.style.transform = 'scale(0.95)';

        if (newState === STATE.WORK) {
            dom.body.classList.add('mode-work');
            dom.badge.innerText = "专注中";
            dom.btnText.innerText = "停止计时";
            dom.btn.className = "btn-main btn-stop";
            totalSeconds = parseInt(dom.inputs.work.value) * 60;
            dom.status.innerText = "运行中...";
        } else if (newState === STATE.REST) {
            dom.body.classList.add('mode-rest');
            dom.badge.innerText = "休息中";
            dom.btnText.innerText = "跳过休息";
            dom.btn.className = "btn-main btn-start"; 
            totalSeconds = parseInt(dom.inputs.rest.value) * 60;
            dom.status.innerText = "起立活动！";
        }

        endTime = Date.now() + (totalSeconds * 1000);
        updateDisplayTime(totalSeconds);
        tick(); 
        intervalId = setInterval(tick, 1000);
    }

    function tick() {
        const now = Date.now();
        const remaining = Math.max(0, Math.ceil((endTime - now) / 1000));
        updateDisplayTime(remaining);
        const elapsed = totalSeconds - remaining;
        const pct = (elapsed / totalSeconds) * 100;
        dom.progress.style.width = `${pct}%`;
        if (remaining <= 0) handleComplete();
    }

    function handleComplete() {
        if (intervalId) { clearInterval(intervalId); intervalId = null; }
        dom.settings.style.transform = 'scale(1)';

        // 1. 触发视觉警报 (如果此时亮屏，屏幕会闪烁)
        triggerVisualAlarm();

        const isWork = currentState === STATE.WORK;
        
        // 2. 触发震动轰炸 (通过发送多次通知实现)
        if (isWork) {
            triggerVibrationBurst("🛑 时间到！", "已自动进入休息模式，请起立活动！");
            
            if (dom.inputs.loop.checked) switchState(STATE.REST);
            else { alert("专注结束！"); switchState(STATE.IDLE); }
        } else {
            triggerVibrationBurst("💻 休息结束", "已自动开始专注，请回座。");
            
            if (dom.inputs.loop.checked) switchState(STATE.WORK);
            else { alert("休息结束！"); switchState(STATE.IDLE); }
        }
    }

    dom.btn.addEventListener('click', () => {
        requestPermission();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        currentState === STATE.IDLE ? switchState(STATE.WORK) : switchState(STATE.IDLE);
    });

    [dom.inputs.work, dom.inputs.rest].forEach(input => {
        input.addEventListener('input', (e) => {
            if (currentState === STATE.IDLE) updateDisplayTime(dom.inputs.work.value * 60);
        });
    });

    const saved = localStorage.getItem('sitAppConfig');
    if (saved) {
        const config = JSON.parse(saved);
        dom.inputs.work.value = config.work || 45;
        dom.inputs.rest.value = config.rest || 5;
        dom.inputs.loop.checked = config.loop !== undefined ? config.loop : true;
        updateDisplayTime(dom.inputs.work.value * 60);
    }
</script>
</body>
</html>
